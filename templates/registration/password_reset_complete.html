{% extends 'core/base_auth.html' %}
{% block page_title %}Contraseña Actualizada{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-lg border-0 rounded-lg text-center" style="width: 100%; max-width: 450px;">
        
        <div class="card-body p-5">
            <i class="bi bi-check-circle-fill" style="font-size: 4rem; color: #39A900;"></i>
            
            <h3 class="font-weight-bold mt-4" style="color: #333333;">¡Contraseña Actualizada!</h3>
            
            <p class="text-muted mt-3 mb-4" style="font-size: 1.1rem;">
                Tu contraseña ha sido restablecida exitosamente. Ya puedes ingresar al sistema con tus nuevas credenciales.
            </p>

            <a href="{% url 'login' %}" class="btn btn-lg w-100 text-white mt-3 shadow-sm" style="background-color: #39A900; border-radius: 8px;">
                <i class="bi bi-box-arrow-in-right me-2"></i> Ir al Inicio de Sesión
            </a>
        </div>
        
    </div>
</div>
{% endblock %}
