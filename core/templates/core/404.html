<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada | SENA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body { 
            background-color: #f4f6f9; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .error-container { 
            text-align: center; 
            background: #ffffff; 
            padding: 4rem 3rem; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            max-width: 600px; 
            width: 90%; 
            border-top: 6px solid #39A900; /* Borde superior Verde SENA */
        }
        .error-code { 
            font-size: 8rem; 
            font-weight: 900; 
            color: #39A900; 
            line-height: 1; 
            margin-bottom: 0; 
            text-shadow: 4px 4px 0px rgba(57, 169, 0, 0.1); 
        }
        .error-icon { 
            font-size: 5rem; 
            color: #FF671F; /* Naranja SENA */
            margin-bottom: 1rem; 
            display: block;
        }
        .btn-sena { 
            background-color: #39A900; 
            color: white; 
            padding: 12px 35px; 
            border-radius: 50px; 
            font-weight: 600; 
            text-decoration: none; 
            display: inline-block; 
            transition: all 0.3s ease; 
            margin-top: 2rem; 
        }
        .btn-sena:hover { 
            background-color: #2D8600; 
            color: white; 
            transform: translateY(-3px); 
            box-shadow: 0 8px 20px rgba(57, 169, 0, 0.3); 
        }
    </style>
</head>
<body>

    <div class="error-container">
        <i class="bi bi-compass error-icon"></i>
        
        <h1 class="error-code">404</h1>
        <h3 class="fw-bold mt-4 text-dark">¡Ups! Te has salido del mapa</h3>
        
        <p class="text-muted mt-3 fs-5">
            La página que intentas buscar no existe, ha sido movida o escribiste mal la dirección URL.
        </p>
        
        <a href="{% url 'core:index' %}" class="btn-sena">
            <i class="bi bi-house-door-fill me-2"></i>Volver a un lugar seguro
        </a>
    </div>

</body>
</html>
