{% load static %}
<style>
    #manual-help-container {
        position: fixed;
        right: 20px;
        bottom: 92px;
        z-index: 9998;
    }

    #manual-help-btn {
        width: 60px;
        height: 60px;
        border: none;
        border-radius: 50%;
        background: linear-gradient(135deg, #ff7e2f 0%, #ff5f1f 100%);
        color: #fff;
        font-size: 2rem;
        font-weight: 700;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #manual-help-btn:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }

    #manualHelpModal .modal-content {
        border-radius: 16px;
        border: 0;
        overflow: hidden;
    }

    #manualHelpModal .modal-header {
        background: #39A900;
        color: #fff;
    }
</style>

<div id="manual-help-container">
    <button id="manual-help-btn" type="button" data-bs-toggle="modal" data-bs-target="#manualHelpModal" aria-label="Abrir ayuda">
        ?
    </button>
</div>

<div class="modal fade" id="manualHelpModal" tabindex="-1" aria-labelledby="manualHelpModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="manualHelpModalLabel">
                    <i class="bi bi-journal-text me-2"></i>Manual de Usuario
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body p-4">
                <p class="mb-3 text-muted">Puedes abrir el manual en una nueva pestaña para consultar todo el paso a paso del sistema.</p>
                <a href="{% static 'docs/Manual_Usuario_APPrendiz.pdf' %}" target="_blank" rel="noopener" class="btn btn-success w-100 fw-bold rounded-pill">
                    <i class="bi bi-box-arrow-up-right me-2"></i>Abrir manual de usuario
                </a>
            </div>
        </div>
    </div>
</div>
